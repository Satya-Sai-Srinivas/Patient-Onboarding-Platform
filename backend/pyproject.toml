[tool.ruff]
target-version = "py311"
line-length = 100
src = ["."]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes (unused imports, undefined names)
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear (common bugs)
    "C4",  # flake8-comprehensions
    "N",   # pep8-naming
    "RUF", # Ruff-specific rules
]
ignore = [
    "E501",  # line too long — handled by formatter
    "B008",  # do not perform function calls in argument defaults (FastAPI Depends pattern)
    "N803",  # argument name should be lowercase (SQLAlchemy column names)
    "N806",  # variable in function should be lowercase
    "RUF012",# mutable class attributes should use ClassVar (SQLAlchemy / Pydantic models)
]

[tool.ruff.lint.isort]
known-first-party = ["config", "crud", "database", "models", "schemas", "realtime"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.pytest.ini_options]
testpaths       = ["tests"]
asyncio_mode    = "auto"
# SQLite test artefact — ignored by .gitignore
addopts         = "-v --tb=short"
