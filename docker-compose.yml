version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  Patient Onboarding — local development stack
#
#  Services
#    db      → PostgreSQL 16 (persistent volume, health-checked)
#    backend → FastAPI on :8000  (waits for db to be healthy)
#    web     → Vite dev server on :5173 (optional, comment out if not needed)
#
#  Quick start
#    docker compose up          # start all services
#    docker compose up backend  # backend + db only
#    docker compose down -v     # stop and remove volumes
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-patient_db}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override DB connection to point at the Compose network alias
      DB_HOST:     db
      DB_PORT:     "5432"
      DB_NAME:     ${DB_NAME:-patient_db}
      DB_USER:     ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Vite web dev server ─────────────────────────────────────────────────────
  web:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE: http://localhost:${BACKEND_PORT:-8000}
    depends_on:
      - backend

volumes:
  postgres_data:
  web_node_modules:
